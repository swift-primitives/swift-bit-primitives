# SwiftLint configuration
# Inherits from the shared parent configuration in swift-standards

parent_config: https://raw.githubusercontent.com/swift-primitives/.github/main/.swiftlint.yml

# Package-specific overrides
disabled_rules:
  - function_parameter_count
  # empty_count false-positives on the institute's typed-count metadata idiom
  # (count == 0 where the type is not a Collection). Relaxed per principal decision 2026-06-02.
  - empty_count
  # no_any_protocol_existential + typed_throws_required fire on the stdlib Codable witnesses
  # (init(from: any Decoder) throws / encode(to: any Encoder) throws): `any` and untyped `throws`
  # are protocol-mandated and cannot be narrowed. Relaxed per principal decision 2026-06-02.
  - no_any_protocol_existential
  - typed_throws_required
